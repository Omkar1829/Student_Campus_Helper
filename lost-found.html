

   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script defer src="./js/lost.js"></script>

<body class="bg-gray-50">


<nav class="flex justify-center items-center gap-10 mt-5">
    <h1 class="text-blue-900 font-extrabold ml-2 mr-24 text-xl">
        <i class="fa-solid fa-book-open mr-2"></i>Smart Campus
    </h1>
    <a href="#" class="text-gray-700 hover:text-blue-700">Dashboard</a>
    <a href="#" class="text-gray-700 hover:text-blue-700">Notes</a>
    <a href="#" class="text-gray-700 hover:text-blue-700">Timetable</a>
    <a href="#" class="text-gray-700 hover:text-blue-700">Events</a>
    <a href="#" class="text-gray-700 hover:text-blue-700">Lost & Found</a>
    <button class="bg-blue-900 text-white rounded px-3 py-1 flex items-center gap-1">
        <i class="fa-solid fa-file-import"></i>Profile
    </button>
</nav>


<div class="mt-2 h-20 bg-gray-200">

   
    <div class="flex items-center justify-between h-full px-4 max-w-5xl mx-auto">

    
        <h1 class="text-lg font-bold">Lost & Found</h1>

        
        <button  id="openModal" class="flex items-center gap-1 bg-blue-600 text-white px-3 py-1 rounded">
            <i class="fa-solid fa-plus"></i>
            Report Lost Item
        </button>
 
        <button  id="FoundModal" class="flex items-center gap-1 bg-blue-600 text-white px-3 py-1 rounded">
            <i class="fa-solid fa-plus"></i>
            Report Found Item
        </button>
    </div>

</div>


<div class="flex justify-center gap-12 mt-4 flex-wrap">
    <div class="bg-blue-100 text-center rounded-lg w-48 h-20 flex flex-col justify-center">
        <h6 id="totalCount" class="text-lg font-bold">0</h6>Total Items
    </div>
    <div class="bg-red-200 text-center rounded-lg w-48 h-20 flex flex-col justify-center">
        <h6   id="lostCount" class="text-lg font-bold">0</h6>Lost
    </div>
    <div class="bg-green-200 text-center rounded-lg w-48 h-20 flex flex-col justify-center">
        <h6  id="foundCount" class="text-lg font-bold">0</h6>Found
    </div>
    <div class="bg-purple-200 text-center rounded-lg w-48 h-20 flex flex-col justify-center">
        <h6  id="recoveryRate" class="text-lg font-bold">0%</h6>Recovery Rate
    </div>
</div>

<hr class="my-5">


<div class="flex items-center gap-4 ml-64 mb-4 flex-wrap">
    <div class="relative w-80">
        <input id="searchInput" type="search" placeholder="Search Items" class="w-full pl-10 pr-2 py-2 rounded border border-gray-300">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
    </div>

    <button id="allBtn" class="bg-gray-200 rounded px-3 py-1 text-sm">All Items</button>
    <button id="lostBtn" class="bg-gray-200 rounded px-3 py-1 text-sm">Lost</button>
    <button id="foundBtn" class="bg-gray-200 rounded px-3 py-1 text-sm">Found</button>
    
</div>

<hr class="mb-4">


<div id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mx-10">

  
    <div class="card found bg-blue-50 rounded-lg border border-black h-[360px] p-4 flex flex-col gap-2">
       <div class="h-36 w-full overflow-hidden rounded mb-2 bg-gray-100">
            <img src="images/id.jpg" class="w-full h-full object-contain">
        </div>
        <div class="flex justify-between items-center">
            <h3 class="font-bold text-lg">Student ID Card</h3>
            <button class="bg-green-300 text-xs px-2 py-1 rounded">Found</button>
        </div>
        <p class="text-sm">Id card for John Smith, batch 2023</p>
        <p class="text-sm">Administration Building</p>
        <p class="text-sm">March 21, 2026</p>
        <p class="text-sm">+1-555-0107</p>
        <button class="bg-blue-200 text-xs px-2 py-1 rounded self-start">Claim Item</button>
    </div>

 <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">

    <div class="bg-white p-6 rounded-lg w-96">

        <h2 class="text-xl font-bold mb-4">Report Lost Item</h2>

        <input id="imageInput" type="file" accept="image/*" class="w-full border p-2 mb-2 rounded">

        <input id="itemName" type="text" placeholder="Item Name" class="w-full border p-2 mb-2 rounded">

        <textarea id="description" placeholder="Description" class="w-full border p-2 mb-2 rounded"></textarea>

        <input id="location" type="text" placeholder="Location" class="w-full border p-2 mb-2 rounded">

        <input   id="date" type="date" class="w-full border p-2 mb-4 rounded">

      
        <div class="flex justify-end gap-2">
            <button id="closeModal" class="px-3 py-1 bg-gray-300 rounded">Cancel</button>
            <button  id="submitBtn" class="px-3 py-1 bg-blue-600 text-white rounded">Submit</button>
        </div>

    </div> 




</div>
