<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-96">
    <h2 class="text-2xl font-bold text-center mb-2">Create Account</h2>
    <p class="text-gray-500 text-center mb-6">Join Smart Campus Helper today</p>

    <form action="register.php" method="POST">
        
        <input type="text" name="name" placeholder="Full Name"
        class="w-full mb-4 p-2 border rounded-lg" required>

        <input type="email" name="email" placeholder="Email Address"
        class="w-full mb-4 p-2 border rounded-lg" required>

        <input type="password" name="password" placeholder="Password"
        class="w-full mb-4 p-2 border rounded-lg" required>

        <input type="password" name="confirm_password" placeholder="Confirm Password"
        class="w-full mb-4 p-2 border rounded-lg" required>

        <button class="w-full bg-blue-600 text-white p-2 rounded-lg">
            Create Account
        </button>
    </form>
</div>

</body>
</html>
