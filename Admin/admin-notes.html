<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300">
    <div id="adminGate" class="p-6"></div>
    <div id="adminContent" class="hidden md:flex">
        <aside class="min-h-screen w-64 border-r bg-white p-6">
            <div class="mb-8 flex items-center justify-between"><h2 class="text-xl font-bold text-indigo-600">Admin Panel</h2></div>
            <nav class="space-y-3 text-sm text-slate-600">
                <a href="admin-dashboard.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Dashboard</a>
                <a href="admin-users.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Students</a>
                <a href="admin-notes.html" class="block rounded-lg bg-indigo-100 px-4 py-2 font-medium text-indigo-600">Notes</a>
                <a href="admin-events.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Events</a>
                <a href="admin-timetable.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Timetable</a>
                <a href="admin-lostfound.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Lost & Found</a>
                <a href="admin-logs.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Logs</a>
            </nav>
        </aside>
        <main class="flex-1">
            <header class="flex items-center justify-between bg-white px-6 py-4 shadow-sm">
                <h1 class="text-lg font-semibold">Notes Management</h1>
                <div class="flex items-center gap-3">
                    <button id="openAdminNoteModal" class="rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white">+ Add Note</button>
                    <button data-logout class="rounded-xl border border-slate-300 px-4 py-2">Logout</button>
                </div>
            </header>
            <div class="space-y-6 p-6">
                <input id="adminNotesSearch" type="text" placeholder="Search notes..." class="w-full rounded-xl border border-slate-300 px-4 py-3">
                <div id="adminNotesGrid" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
            </div>
        </main>
    </div>

    <div id="adminNoteModal" class="fixed inset-0 hidden bg-black/50 px-4 py-8" data-edit-id="">
        <div class="mx-auto max-w-xl rounded-3xl bg-white p-6 shadow-2xl">
            <div class="mb-6 flex items-center justify-between">
                <h2 id="adminNoteModalTitle" class="text-lg font-bold">Add Note</h2>
                <button id="closeAdminNoteModal" class="rounded-xl border border-slate-300 px-3 py-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="adminNoteForm" class="space-y-4">
                <input id="adminNoteTitle" type="text" placeholder="Title" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                <textarea id="adminNoteDescription" rows="4" placeholder="Description" class="w-full rounded-xl border border-slate-300 px-4 py-3" required></textarea>
                <div class="grid gap-4 md:grid-cols-2">
                    <input id="adminNoteFile" type="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.zip" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                    <input id="adminNoteDownloads" type="number" min="0" value="0" placeholder="Downloads" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                </div>
                <input id="adminNotePath" type="text" placeholder="Optional external file path" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                <button id="saveAdminNoteBtn" type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white">Create Note</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-notes.js"></script>
</body>
</html>
