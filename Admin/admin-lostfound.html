<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300">
    <div id="adminGate" class="p-6"></div>
    <div id="adminContent" class="hidden md:flex">
        <aside class="min-h-screen w-64 border-r bg-white p-6">
            <div class="mb-8 flex items-center justify-between"><h2 class="text-xl font-bold text-indigo-600">Admin Panel</h2></div>
            <nav class="space-y-3 text-sm text-slate-600">
                <a href="admin-dashboard.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Dashboard</a>
                <a href="admin-users.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Students</a>
                <a href="admin-notes.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Notes</a>
                <a href="admin-events.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Events</a>
                <a href="admin-timetable.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Timetable</a>
                <a href="admin-lostfound.html" class="block rounded-lg bg-indigo-100 px-4 py-2 font-medium text-indigo-600">Lost & Found</a>
                <a href="admin-logs.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Logs</a>
            </nav>
        </aside>
        <main class="flex-1">
            <header class="flex items-center justify-between bg-white px-6 py-4 shadow-sm">
                <h1 class="text-lg font-semibold">Lost & Found Management</h1>
                <div class="flex items-center gap-3">
                    <button id="openAdminLostFoundModal" class="rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white">+ Add Item</button>
                    <button data-logout class="rounded-xl border border-slate-300 px-4 py-2">Logout</button>
                </div>
            </header>
            <div class="space-y-6 p-6">
                <input id="adminLostFoundSearch" type="text" placeholder="Search items..." class="w-full rounded-xl border border-slate-300 px-4 py-3">
                <div class="overflow-hidden rounded-2xl bg-white shadow-sm">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-100 text-slate-600">
                            <tr>
                                <th class="p-4">Item</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th>User</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminLostFoundTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="adminLostFoundModal" class="fixed inset-0 hidden bg-black/50 px-4 py-8" data-edit-id="">
        <div class="mx-auto max-w-2xl rounded-3xl bg-white p-6 shadow-2xl">
            <div class="mb-6 flex items-center justify-between">
                <h2 id="adminLostFoundModalTitle" class="text-lg font-bold">Add Item</h2>
                <button id="closeAdminLostFoundModal" class="rounded-xl border border-slate-300 px-3 py-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="adminLostFoundForm" class="space-y-4">
                <select id="adminLostFoundUser" class="w-full rounded-xl border border-slate-300 px-4 py-3" required></select>
                <div class="grid gap-4 md:grid-cols-2">
                    <select id="adminLostFoundType" class="w-full rounded-xl border border-slate-300 px-4 py-3"><option value="lost">Lost</option><option value="found">Found</option></select>
                    <select id="adminLostFoundStatus" class="w-full rounded-xl border border-slate-300 px-4 py-3"><option value="open">Open</option><option value="matched">Matched</option><option value="resolved">Resolved</option></select>
                </div>
                <input id="adminLostFoundName" type="text" placeholder="Item name" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                <textarea id="adminLostFoundDescription" rows="4" placeholder="Description" class="w-full rounded-xl border border-slate-300 px-4 py-3" required></textarea>
                <div class="grid gap-4 md:grid-cols-2">
                    <input id="adminLostFoundLocation" type="text" placeholder="Location" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                    <input id="adminLostFoundContact" type="text" placeholder="Contact info" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                </div>
                <input id="adminLostFoundDate" type="date" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                <input id="adminLostFoundImage" type="file" accept=".jpg,.jpeg,.png,.gif,.webp" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                <button id="saveAdminLostFoundBtn" type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white">Create Item</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-lostfound.js"></script>
</body>
</html>
