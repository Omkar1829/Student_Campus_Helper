<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        .notice-board { background: #7c2d12; padding: 16px; border-radius: 14px; }
        .board-inner { background: #991b1b; padding: 20px; border-radius: 10px; }
        .note { background: #fffdf7; padding: 14px; border-radius: 8px; position: relative; transform: rotate(-2deg); }
        .note:nth-child(even) { transform: rotate(2deg); }
        .pin { width: 10px; height: 10px; background: red; border-radius: 50%; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300">
    <div id="adminGate" class="p-6"></div>
    <div id="adminContent" class="hidden md:flex">
        <aside class="min-h-screen w-64 border-r bg-white p-6">
            <div class="mb-8 flex items-center justify-between"><h2 class="text-xl font-bold text-indigo-600">Admin Panel</h2></div>
            <nav class="space-y-3 text-sm text-slate-600">
                <a href="admin-dashboard.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Dashboard</a>
                <a href="admin-users.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Students</a>
                <a href="admin-notes.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Notes</a>
                <a href="admin-events.html" class="block rounded-lg bg-indigo-100 px-4 py-2 font-medium text-indigo-600">Events</a>
                <a href="admin-timetable.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Timetable</a>
                <a href="admin-lostfound.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Lost & Found</a>
                <a href="admin-logs.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Logs</a>
            </nav>
        </aside>
        <main id="adminEventsRoot" class="flex-1">
            <header class="flex items-center justify-between bg-white px-6 py-4 shadow-sm">
                <h1 class="text-lg font-semibold">Events Management</h1>
                <div class="flex items-center gap-3">
                    <button id="openAdminEventModal" class="rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white">+ Add Event</button>
                    <button data-logout class="rounded-xl border border-slate-300 px-4 py-2">Logout</button>
                </div>
            </header>
            <div class="space-y-8 p-6">
                <input id="adminEventsSearch" type="text" placeholder="Search events..." class="w-full rounded-xl border border-slate-300 px-4 py-3">
                <section>
                    <h3 class="mb-4 font-semibold">Announcements</h3>
                    <div class="notice-board"><div id="adminAnnouncementBoard" class="board-inner grid gap-6 md:grid-cols-3"></div></div>
                </section>
                <section>
                    <h3 class="mb-4 font-semibold">Important Events</h3>
                    <div id="adminImportantEvents" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
                </section>
                <section>
                    <h3 class="mb-4 font-semibold">Other Events</h3>
                    <div id="adminOtherEvents" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="adminEventModal" class="fixed inset-0 hidden bg-black/50 px-4 py-8" data-edit-id="">
        <div class="mx-auto max-w-xl rounded-3xl bg-white p-6 shadow-2xl">
            <div class="mb-6 flex items-center justify-between">
                <h2 id="adminEventModalTitle" class="text-lg font-bold">Add Event</h2>
                <button id="closeAdminEventModal" class="rounded-xl border border-slate-300 px-3 py-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="adminEventForm" class="space-y-4">
                <input id="adminEventTitle" type="text" placeholder="Title" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                <textarea id="adminEventDescription" rows="4" placeholder="Description" class="w-full rounded-xl border border-slate-300 px-4 py-3" required></textarea>
                <div class="grid gap-4 md:grid-cols-2">
                    <input id="adminEventDate" type="date" class="w-full rounded-xl border border-slate-300 px-4 py-3" required>
                    <input id="adminEventTime" type="time" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <input id="adminEventLocation" type="text" placeholder="Location" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                    <select id="adminEventType" class="w-full rounded-xl border border-slate-300 px-4 py-3">
                        <option value="announcement">Announcement</option>
                        <option value="important">Important</option>
                        <option value="placement">Placement</option>
                        <option value="workshop">Workshop</option>
                        <option value="seminar">Seminar</option>
                        <option value="general">General</option>
                    </select>
                </div>
                <button id="saveAdminEventBtn" type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-3 font-semibold text-white">Create Event</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-events.js"></script>
</body>
</html>
