<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Events</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        .notice-board {
            background: #7c2d12;
            padding: 16px;
            border-radius: 14px;
        }

        .board-inner {
            background: #991b1b;
            padding: 20px;
            border-radius: 10px;
        }

        .note {
            background: #fffdf7;
            padding: 14px;
            border-radius: 8px;
            position: relative;
            transform: rotate(-2deg);
        }

        .note:nth-child(even) {
            transform: rotate(2deg);
        }

        .pin {
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>

</head>

<body class="bg-gray-50 text-gray-800 flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r min-h-screen p-6">
        <h2 class="text-xl font-bold text-indigo-600 mb-8">📘 Admin Panel</h2>

        <nav class="space-y-3 text-gray-600">
            <a href="admin-dashboard.html" class="block px-4 py-2 rounded-lg">Dashboard</a>
            <a href="admin-users.html" class="block px-4 py-2 rounded-lg">Students</a>
            <a href="admin-notes.html" class="block px-4 py-2 rounded-lg">Notes</a>
            <a href="#" class="block bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg">Events</a>
            <a href="admin-timetable.html" class="block px-4 py-2 rounded-lg">Timetable</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1">

        <!-- TOPBAR -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between">
            <h1 class="text-lg font-semibold">Events Management</h1>

            <button onclick="openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
                + Add Event
            </button>
        </header>

        <div class="p-6">

            <!-- 🔴 NOTICE BOARD -->
            <h3 class="font-bold mb-4">📌 Announcements</h3>

            <div class="notice-board mb-8">
                <div id="announcementBoard" class="board-inner grid md:grid-cols-3 gap-6"></div>
            </div>

            <!-- IMPORTANT -->
            <h3 class="font-bold mb-4">🔴 Important Events</h3>
            <div id="importantEvents" class="grid md:grid-cols-3 gap-6 mb-8"></div>

            <!-- OTHER -->
            <h3 class="font-bold mb-4">📦 Other Events</h3>
            <div id="otherEvents" class="grid md:grid-cols-3 gap-6"></div>

        </div>

    </main>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center">

        <div class="bg-white p-6 rounded-xl w-96">

            <h2 class="text-lg font-bold mb-4">Add Event</h2>

            <input id="title" placeholder="Title" class="w-full border p-2 mb-2 rounded">
            <input id="date" placeholder="Date" class="w-full border p-2 mb-2 rounded">

            <select id="category" class="w-full border p-2 mb-2 rounded">
                <option value="announcement">Announcement</option>
                <option value="important">Important</option>
                <option value="workshop">Workshop</option>
                <option value="seminar">Seminar</option>
            </select>

            <input id="expiry" placeholder="Expiry (for announcement)" class="w-full border p-2 mb-2 rounded">

            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeModal()" class="px-4 py-2 border rounded">Cancel</button>
                <button onclick="saveEvent()" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
            </div>

        </div>
    </div>

    <script>

        let events = [
            { id: 1, title: "Exam Notice", date: "April 22", category: "announcement", expiry: "April 30" },
            { id: 2, title: "Placement Drive", date: "April 20", category: "important" },
            { id: 3, title: "Coding Workshop", date: "April 10", category: "workshop" }
        ];

        let editId = null;

        function renderEvents() {

            let announcementHTML = "";
            let importantHTML = "";
            let otherHTML = "";

            events.forEach(e => {

                if (e.category === "announcement") {
                    announcementHTML += `
<div class="note">
<div class="pin"></div>
<h3 class="font-semibold">${e.title}</h3>
<p class="text-xs mt-2">Valid till: ${e.expiry || '-'}</p>

<div class="flex justify-end gap-2 mt-3">
<button onclick="editEvent(${e.id})">✏️</button>
<button onclick="deleteEvent(${e.id})">🗑️</button>
</div>
</div>`;
                }

                else if (e.category === "important") {
                    importantHTML += eventCard(e);
                }

                else {
                    otherHTML += eventCard(e);
                }

            });

            document.getElementById("announcementBoard").innerHTML = announcementHTML;
            document.getElementById("importantEvents").innerHTML = importantHTML;
            document.getElementById("otherEvents").innerHTML = otherHTML;

        }

        function eventCard(e) {
            return `
<div class="bg-white p-5 rounded-xl border">

<h3 class="font-semibold">${e.title}</h3>
<p class="text-sm text-gray-500">${e.date}</p>

<div class="flex justify-end gap-2 mt-4">
<button onclick="editEvent(${e.id})" class="text-indigo-600">Edit</button>
<button onclick="deleteEvent(${e.id})" class="text-red-500">Delete</button>
</div>

</div>`;
        }

        renderEvents();

        function openModal() {
            document.getElementById("modal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
            clearForm();
        }

        function clearForm() {
            document.getElementById("title").value = "";
            document.getElementById("date").value = "";
            document.getElementById("category").value = "announcement";
            document.getElementById("expiry").value = "";
            editId = null;
        }

        function saveEvent() {

            const title = document.getElementById("title").value;
            const date = document.getElementById("date").value;
            const category = document.getElementById("category").value;
            const expiry = document.getElementById("expiry").value;

            if (editId) {
                events = events.map(e => e.id == editId ? { ...e, title, date, category, expiry } : e);
            } else {
                events.push({ id: Date.now(), title, date, category, expiry });
            }

            closeModal();
            renderEvents();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            renderEvents();
        }

        function editEvent(id) {
            const e = events.find(e => e.id === id);

            document.getElementById("title").value = e.title;
            document.getElementById("date").value = e.date;
            document.getElementById("category").value = e.category;
            document.getElementById("expiry").value = e.expiry || "";

            editId = id;
            openModal();
        }

    </script>

</body>

</html>
