<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Timetable</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-50 text-gray-800 flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r min-h-screen p-6">
        <h2 class="text-xl font-bold text-indigo-600 mb-8">📘 Admin Panel</h2>

        <nav class="space-y-3 text-gray-600">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="admin-users.html">Students</a>
            <a href="admin-notes.html">Notes</a>
            <a href="admin-events.html">Events</a>
            <a href="#" class="text-indigo-600 font-semibold">Timetable</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1">

        <!-- TOPBAR -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between">

            <h1 class="font-semibold">Timetable Management</h1>

            <div class="flex gap-3">

                <select id="weekSelect" class="border px-3 py-2 rounded-lg">
                    <option value="current">Current Week</option>
                    <option value="next">Next Week</option>
                </select>

                <button onclick="clearWeek()" class="border px-4 py-2 rounded-lg">
                    Clear Week
                </button>

            </div>

        </header>

        <!-- GRID -->
        <div class="p-6 overflow-auto">

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">

                <table class="w-full text-center">

                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3">Time</th>
                            <th>Mon</th>
                            <th>Tue</th>
                            <th>Wed</th>
                            <th>Thu</th>
                            <th>Fri</th>
                            <th>Sat</th>
                        </tr>
                    </thead>

                    <tbody id="timetableBody"></tbody>

                </table>

            </div>

        </div>

    </main>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center">

        <div class="bg-white p-6 rounded-xl w-96">

            <h2 class="font-bold mb-4">Add / Edit Class</h2>

            <input id="subject" placeholder="Subject" class="w-full border p-2 mb-2 rounded">
            <input id="room" placeholder="Room" class="w-full border p-2 mb-2 rounded">

            <select id="color" class="w-full border p-2 mb-4 rounded">
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="pink">Pink</option>
                <option value="orange">Orange</option>
            </select>

            <div class="flex justify-between">
                <button onclick="deleteClass()" class="text-red-500">Delete</button>

                <div class="flex gap-2">
                    <button onclick="closeModal()" class="border px-4 py-2 rounded">Cancel</button>
                    <button onclick="saveClass()" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
                </div>
            </div>

        </div>
    </div>

    <script>

        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const times = ["9-10:30", "10:45", "1-2:30", "2:45", "4:30"];

        let data = {
            current: {},
            next: {}
        };

        let selectedCell = null;

        // render grid
        function render() {
            const body = document.getElementById("timetableBody");
            body.innerHTML = "";

            const week = document.getElementById("weekSelect").value;

            times.forEach(time => {
                let row = `<tr><td class="p-3">${time}</td>`;

                days.forEach(day => {
                    const key = `${day}-${time}`;
                    const cell = data[week][key];

                    if (cell) {
                        row += `
<td onclick="openModal('${key}')">
<div class="bg-${cell.color}-100 p-2 rounded-lg">
${cell.subject}
</div>
</td>`;
                    } else {
                        row += `<td onclick="openModal('${key}')">+</td>`;
                    }
                });

                row += "</tr>";
                body.innerHTML += row;
            });
        }

        render();

        // modal
        function openModal(key) {
            selectedCell = key;
            document.getElementById("modal").classList.remove("hidden");

            const week = document.getElementById("weekSelect").value;
            const existing = data[week][key];

            if (existing) {
                document.getElementById("subject").value = existing.subject;
                document.getElementById("room").value = existing.room;
                document.getElementById("color").value = existing.color;
            } else {
                document.getElementById("subject").value = "";
                document.getElementById("room").value = "";
            }
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
        }

        function saveClass() {
            const week = document.getElementById("weekSelect").value;

            data[week][selectedCell] = {
                subject: document.getElementById("subject").value,
                room: document.getElementById("room").value,
                color: document.getElementById("color").value
            };

            closeModal();
            render();
        }

        function deleteClass() {
            const week = document.getElementById("weekSelect").value;
            delete data[week][selectedCell];

            closeModal();
            render();
        }

        function clearWeek() {
            const week = document.getElementById("weekSelect").value;
            data[week] = {};
            render();
        }

        // switch week
        document.getElementById("weekSelect").addEventListener("change", render);

    </script>

</body>

</html>
