<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Students</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="bg-gray-50 text-gray-800 flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r min-h-screen p-6">
        <h2 class="text-xl font-bold text-indigo-600 mb-8">📘 Admin Panel</h2>

        <nav class="space-y-3 text-gray-600">
            <a href="admin-dashboard.html" class="block px-4 py-2 rounded-lg hover:bg-gray-100">Dashboard</a>
            <a href="#" class="block bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg">Students</a>
            <a href="admin-notes.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">Notes</a>
            <a href="admin-events.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">Events</a>
            <a href="admin-timetable.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">Timetable</a>
            <a href="admin-lostfound.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">Lost & Found</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1">

        <!-- TOPBAR -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
            <h1 class="text-lg font-semibold">Student Management</h1>

            <button onclick="openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
                + Add Student
            </button>
        </header>

        <!-- CONTENT -->
        <div class="p-6">

            <!-- SEARCH -->
            <div class="mb-4">
                <input id="search" type="text" placeholder="Search student..."
                    class="w-full border px-4 py-2 rounded-lg">
            </div>

            <!-- TABLE -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">

                <table class="w-full text-sm text-left">

                    <thead class="bg-gray-100 text-gray-600">
                        <tr>
                            <th class="p-4">Name</th>
                            <th>Email</th>
                            <th>Branch</th>
                            <th>Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="studentTable">

                        <!-- JS DATA -->

                    </tbody>

                </table>

            </div>

        </div>

    </main>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center">

        <div class="bg-white p-6 rounded-xl w-96">

            <h2 class="text-lg font-bold mb-4" id="modalTitle">Add Student</h2>

            <input id="name" placeholder="Name" class="w-full border p-2 mb-2 rounded">
            <input id="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
            <input id="branch" placeholder="Branch" class="w-full border p-2 mb-2 rounded">

            <select id="role" class="w-full border p-2 mb-4 rounded">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>

            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 border rounded">Cancel</button>
                <button onclick="saveStudent()" class="bg-indigo-600 text-white px-4 py-2 rounded">Save</button>
            </div>

        </div>
    </div>

    <script>
        let students = [
            { id: 1, name: "Omkar Kale", email: "omkar@gmail.com", branch: "CS", role: "student" },
            { id: 2, name: "Rahul Patil", email: "rahul@gmail.com", branch: "IT", role: "student" }
        ];

        let editId = null;

        function renderTable() {
            const table = document.getElementById("studentTable");
            table.innerHTML = "";

            students.forEach(s => {
                table.innerHTML += `
<tr class="border-t">
<td class="p-4">${s.name}</td>
<td>${s.email}</td>
<td>${s.branch}</td>
<td>
<span class="px-2 py-1 rounded text-xs ${s.role == 'admin' ? 'bg-purple-200' : 'bg-green-200'}">
${s.role}
</span>
</td>
<td>
<button onclick="editStudent(${s.id})" class="text-indigo-600">Edit</button>
<button onclick="deleteStudent(${s.id})" class="text-red-500 ml-2">Delete</button>
</td>
</tr>`;
            });
        }

        renderTable();

        function openModal() {
            document.getElementById("modal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
            clearForm();
        }

        function clearForm() {
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("branch").value = "";
            editId = null;
        }

        function saveStudent() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const branch = document.getElementById("branch").value;
            const role = document.getElementById("role").value;

            if (editId) {
                students = students.map(s => s.id == editId ? { ...s, name, email, branch, role } : s);
            } else {
                students.push({
                    id: Date.now(),
                    name, email, branch, role
                });
            }

            closeModal();
            renderTable();
        }

        function deleteStudent(id) {
            students = students.filter(s => s.id !== id);
            renderTable();
        }

        function editStudent(id) {
            const s = students.find(s => s.id === id);

            document.getElementById("name").value = s.name;
            document.getElementById("email").value = s.email;
            document.getElementById("branch").value = s.branch;
            document.getElementById("role").value = s.role;

            editId = id;
            openModal();
        }

    </script>

</body>

</html>
