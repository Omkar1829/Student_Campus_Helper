<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300">
    <div id="adminGate" class="p-6"></div>
    <div id="adminContent" class="hidden md:flex">
        <aside class="min-h-screen w-64 border-r bg-white p-6">
            <div class="mb-8 flex items-center justify-between">
                <h2 class="text-xl font-bold text-indigo-600">Admin Panel</h2>
            </div>
            <nav class="space-y-3 text-sm text-slate-600">
                <a href="admin-dashboard.html" class="block rounded-lg bg-indigo-100 px-4 py-2 font-medium text-indigo-600">Dashboard</a>
                <a href="admin-users.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Students</a>
                <a href="admin-notes.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Notes</a>
                <a href="admin-events.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Events</a>
                <a href="admin-timetable.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Timetable</a>
                <a href="admin-lostfound.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Lost & Found</a>
                <a href="admin-logs.html" class="block rounded-lg px-4 py-2 transition hover:bg-gray-100">Logs</a>
            </nav>
        </aside>

        <main class="flex-1">
            <header class="flex items-center justify-between bg-white px-6 py-4 shadow-sm">
                <div>
                    <h1 class="text-lg font-semibold">Admin Dashboard</h1>
                    <p class="text-sm text-slate-500">Live overview of students, notes, events, items, and logs</p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-slate-500">Admin: <span data-user-name>Admin</span></span>
                    <button data-logout class="rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white transition hover:bg-indigo-700">Logout</button>
                </div>
            </header>

            <div class="space-y-8 p-6">
                <div class="grid gap-6 md:grid-cols-3 xl:grid-cols-6">
                    <div class="rounded-2xl bg-blue-100 p-6"><p class="text-sm text-slate-600">Students</p><h2 id="statStudents" class="mt-2 text-2xl font-bold">0</h2></div>
                    <div class="rounded-2xl bg-yellow-100 p-6"><p class="text-sm text-slate-600">Notes</p><h2 id="statNotes" class="mt-2 text-2xl font-bold">0</h2></div>
                    <div class="rounded-2xl bg-purple-100 p-6"><p class="text-sm text-slate-600">Events</p><h2 id="statEvents" class="mt-2 text-2xl font-bold">0</h2></div>
                    <div class="rounded-2xl bg-green-100 p-6"><p class="text-sm text-slate-600">Lost & Found</p><h2 id="statLostFound" class="mt-2 text-2xl font-bold">0</h2></div>
                    <div class="rounded-2xl bg-indigo-100 p-6"><p class="text-sm text-slate-600">Login Logs</p><h2 id="statLogins" class="mt-2 text-2xl font-bold">0</h2></div>
                    <div class="rounded-2xl bg-rose-100 p-6"><p class="text-sm text-slate-600">Activity Logs</p><h2 id="statActivities" class="mt-2 text-2xl font-bold">0</h2></div>
                </div>

                <div class="grid gap-6 xl:grid-cols-3">
                    <section class="rounded-2xl bg-white p-5 shadow-sm">
                        <h3 class="mb-4 font-semibold">Recent Events</h3>
                        <ul id="recentEvents" class="space-y-3"></ul>
                    </section>
                    <section class="rounded-2xl bg-white p-5 shadow-sm">
                        <h3 class="mb-4 font-semibold">Recent Notes</h3>
                        <ul id="recentNotes" class="space-y-3"></ul>
                    </section>
                    <section class="rounded-2xl bg-white p-5 shadow-sm">
                        <h3 class="mb-4 font-semibold">Recent Logs</h3>
                        <ul id="recentLogs" class="space-y-3"></ul>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
