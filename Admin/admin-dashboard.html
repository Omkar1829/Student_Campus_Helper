<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="bg-gray-50 text-gray-800 flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r min-h-screen p-6">

        <h2 class="text-xl font-bold text-indigo-600 mb-8">
            📘 Admin Panel
        </h2>

        <nav class="space-y-3 text-gray-600">

            <a href="#" class="block bg-indigo-100 text-indigo-600 px-4 py-2 rounded-lg">
                Dashboard
            </a>

            <a href="admin-users.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">
                👨‍🎓 Students
            </a>

            <a href="admin-notes.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">
                📄 Notes
            </a>

            <a href="admin-events.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">
                📅 Events
            </a>

            <a href="admin-timetable.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">
                ⏰ Timetable
            </a>

            <a href="admin-lostfound.html" class="block px-4 py-2 hover:bg-gray-100 rounded-lg">
                📦 Lost & Found
            </a>

        </nav>

    </aside>

    <!-- MAIN -->
    <main class="flex-1">

        <!-- TOPBAR -->
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between">
            <h1 class="text-lg font-semibold">Admin Dashboard</h1>

            <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg">
                Logout
            </button>
        </header>

        <!-- CONTENT -->
        <div class="p-6">

            <!-- STATS -->
            <div class="grid md:grid-cols-4 gap-6 mb-8">

                <div class="bg-blue-100 p-6 rounded-xl">
                    <p class="text-sm text-gray-600">Students</p>
                    <h2 class="text-2xl font-bold">120</h2>
                </div>

                <div class="bg-yellow-100 p-6 rounded-xl">
                    <p class="text-sm text-gray-600">Notes</p>
                    <h2 class="text-2xl font-bold">45</h2>
                </div>

                <div class="bg-purple-100 p-6 rounded-xl">
                    <p class="text-sm text-gray-600">Events</p>
                    <h2 class="text-2xl font-bold">10</h2>
                </div>

                <div class="bg-green-100 p-6 rounded-xl">
                    <p class="text-sm text-gray-600">Lost Items</p>
                    <h2 class="text-2xl font-bold">8</h2>
                </div>

            </div>

            <!-- RECENT -->
            <div class="grid md:grid-cols-2 gap-6">

                <div class="bg-white p-5 rounded-xl shadow-sm">
                    <h3 class="font-semibold mb-3">Recent Events</h3>
                    <ul class="text-sm space-y-2">
                        <li>📅 Tech Symposium</li>
                        <li>📅 Placement Drive</li>
                    </ul>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-sm">
                    <h3 class="font-semibold mb-3">Recent Notes</h3>
                    <ul class="text-sm space-y-2">
                        <li>📄 React Hooks</li>
                        <li>📄 DBMS Notes</li>
                    </ul>
                </div>

            </div>

        </div>

    </main>

</body>

</html>
